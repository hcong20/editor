[project]
title = "电影一键浓缩系统"
target_minutes = 12
language = "zh"
fallback_duration_seconds = 7200

[providers]
shot_detector = "auto"
asr = "auto"
vision = "ollama"
story = "ollama"
script = "ollama"
selector = "heuristic"
video_editor = "ffmpeg"
tts = "auto"
subtitles = "auto"

[shot_detection]
target_shot_count = 160
min_shot_length = 1.2

[compression]
selection_ratio = 0.2
coverage_per_arc = 2
scene_group_size = 8
short_ratio = 0.35
teaser_ratio = 0.12

[script]
max_chars = 2200
tone = "通俗、有感染力、强调冲突和转折"

[delivery]
enabled = false
variant = "commentary_10m"
burn_subtitles = true
concat_filename = "08_movie_cut.mp4"
final_filename = "09_commentary_final.mp4"

[tts]
edge_voice = "zh-CN-YunxiNeural"
edge_rate = "+0%"
elevenlabs_api_key_env = "ELEVENLABS_API_KEY"
elevenlabs_voice_id = ""
elevenlabs_model_id = "eleven_multilingual_v2"
azure_key_env = "AZURE_SPEECH_KEY"
azure_region_env = "AZURE_SPEECH_REGION"
azure_voice = "zh-CN-YunxiNeural"

[subtitles]
max_chars_per_line = 24
min_seconds_per_line = 1.2
whisper_model = "small"
whisper_device = "auto"
whisper_compute_type = "int8"

[frames]
frames_per_scene = 2
image_max_width = 896
image_quality = 3

[pyscenedetect]
detector = "content"
threshold = 27.0
min_scene_len_frames = 15

[faster_whisper]
model = "small"
device = "auto"
compute_type = "int8"
beam_size = 5
vad_filter = true
condition_on_previous_text = true

[openai]
api_key_env = "OPENAI_API_KEY"
base_url = "https://api.openai.com/v1/responses"
scene_model = "gpt-4o"
script_model = "gpt-4o"
image_detail = "low"
scene_max_output_tokens = 900
script_max_output_tokens = 2600
scene_temperature = 0.2
script_temperature = 0.8
timeout_seconds = 120

[gemini]
api_key_env = "GEMINI_API_KEY"
base_url = "https://generativelanguage.googleapis.com/v1beta"
scene_model = "gemini-2.5-flash"
script_model = "gemini-2.5-flash"
scene_max_output_tokens = 900
script_max_output_tokens = 2600
scene_temperature = 0.2
script_temperature = 0.8
timeout_seconds = 120

[ollama]
base_url = "http://127.0.0.1:11434/api/chat"
scene_model = "gemma4:31b-cloud"
script_model = "gemma4:31b-cloud"
keep_alive = "5m"
scene_max_output_tokens = 9000
script_max_output_tokens = 26000
scene_temperature = 0.2
script_temperature = 0.8
timeout_seconds = 180
